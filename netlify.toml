[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/downloads/SwiftTyping-Setup.zip"
  to = "https://github.com/SW-YONTO/SWIFT-TYPING/releases/download/v3.26.8/Swift-Typing-v3.26.8.zip"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/Swift-Typing-Setup-3.26.8.zip"
  to = "https://github.com/SW-YONTO/SWIFT-TYPING/releases/download/v3.26.8/Swift-Typing-v3.26.8.zip"
  status = 302
  force = true
