<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Swift Typing - A comprehensive typing tutor web and desktop application. Learn to type faster with lessons, practice modes, and performance tracking. Master Swift Type today." />
    <meta name="keywords" content="swift typing, swift type, typing tutor, touch typing, typing test, typing practice, WPM, typing speed, free typing game" />
    <link rel="canonical" href="https://swift-typing.me/app" />
    
    <!-- Open Graph & Twitter Cards for SEO & Social Sharing -->
    <meta property="og:title" content="Swift Typing - Desktop & Web Typing Tutor" />
    <meta property="og:description" content="Master touch typing with Swift Typing. Features lessons, speed tests, and detailed progress tracking." />
    <meta property="og:url" content="https://swift-typing.me/app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://swift-typing.me/ICONS/icon.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Swift Typing - Learn to Type Fast" />
    <meta name="twitter:description" content="A comprehensive typing tutor app to improve your WPM." />

    <!-- Disable auto-suggestions and form auto-fill -->
    <meta name="autocomplete" content="off" />
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
    
    <!-- Content Security Policy for Electron and Web (Whitelisting Clerk, Stripe, Google Analytics & Supabase) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.accounts.dev https://www.googletagmanager.com https://*.googletagmanager.com https://js.stripe.com https://pagead2.googlesyndication.com https://*.googlesyndication.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://img.clerk.com https://www.google-analytics.com https://*.google-analytics.com https://*.googlesyndication.com https://*.doubleclick.net https://*.google.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.clerk.accounts.dev https://clerk-telemetry.com https://*.clerk-telemetry.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://api.stripe.com https://*.supabase.co wss://*.supabase.co https://pagead2.googlesyndication.com https://*.googlesyndication.com; frame-src 'self' https://*.clerk.accounts.dev https://js.stripe.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; object-src 'none'; base-uri 'self';">
    
    <title>Swift Typing | Learn Swift Type Fast - Typing Tutor</title>
    
    <!-- Inline critical CSS for immediate loading -->
    <style>
      /* Critical CSS for immediate loading */
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        /* Remove fixed background/color - let theme context handle it */
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Loading spinner */
      .loading-spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Loading screen */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
        transition: opacity 0.5s ease-out, background-color 0.3s ease;
      }
      
      .loading-logo-container {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
      }

      .loading-icon {
        width: 48px;
        height: 48px;
        animation: float 3s ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .loading-title {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 15px;
        opacity: 0.6;
      }

      .cursor-blink {
        display: inline-block;
        width: 8px;
        height: 18px;
        background-color: #3b82f6;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      /* Theme-aware body styling */
      body[data-theme-mode="dark"] {
        background-color: #111827 !important;
        color: #f9fafb !important;
      }
      
      body[data-theme-mode="light"] {
        background-color: var(--theme-background, #f8fafc) !important;
        color: var(--theme-text, #1e293b) !important;
      }
      
      /* Ensure theme transitions work */
      body, #root {
        transition: background-color 0.3s ease, color 0.3s ease;
      }
    </style>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4869966197556742" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root">
      <!-- Enhanced Loading Screen -->
      <div class="loading-screen" id="loading-screen">
        <div class="loading-logo-container">
          <svg class="loading-icon" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
          </svg>
          <div class="loading-title">Swift Typing</div>
        </div>
        <div class="typing-indicator">
          <span>Loading workspace</span>
          <span class="cursor-blink"></span>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Theme initialization script - runs before React loads -->
    <script>
      // Initialize theme immediately to prevent flash
      (function() {
        const savedTheme = localStorage.getItem('typing_app_theme') || 'blue';
        const themes = {
          blue: { mode: 'light', bg: '#eff6ff', text: '#111827' },
          green: { mode: 'light', bg: '#f0fdf4', text: '#111827' },
          orange: { mode: 'light', bg: '#fff7ed', text: '#111827' },
          darkBlue: { mode: 'dark', bg: '#111827', text: '#f9fafb' },
          darkGreen: { mode: 'dark', bg: '#111827', text: '#f9fafb' },
          darkPurple: { mode: 'dark', bg: '#111827', text: '#f9fafb' }
        };
        
        const theme = themes[savedTheme] || themes.blue;
        document.body.setAttribute('data-theme', savedTheme);
        document.body.setAttribute('data-theme-mode', theme.mode);
        document.body.style.backgroundColor = theme.bg;
        document.body.style.color = theme.text;
        
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.style.backgroundColor = theme.bg;
          loadingScreen.style.color = theme.text;
        }
      })();
    </script>
    
    <!-- Remove loading screen once app loads -->
    <script>
      // Remove loading screen once React app is loaded
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease-out';
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 1000); // Small delay to show the loading screen
      });
      
      // Handle any errors
      window.addEventListener('error', (event) => {
        console.error('Application error:', event.error);
      });
      
      // Prevent context menu in production
      if (window.location.protocol === 'file:') {
        document.addEventListener('contextmenu', (e) => {
          e.preventDefault();
        });
      }
    </script>
  </body>
</html>
